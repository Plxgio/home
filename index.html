<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>/Plxgio/ (・_・;)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'VT323', monospace;
            background-color: #000000;
            color: #e0e0e0;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            letter-spacing: 1px;
            position: relative;
            padding-top: 60px;
        }

        /* ── Particles ── */
        #particles-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            color: rgba(77, 171, 247, 0.15);
            font-size: 20px;
            opacity: 0;
            animation: floatParticle 20s linear infinite;
            user-select: none;
        }

        @keyframes floatParticle {
            0%   { transform: translateY(100vh) rotate(0deg);   opacity: 0; }
            10%  { opacity: 0.8; }
            90%  { opacity: 0.8; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        .symbol-1::before  { content: '{'; }
        .symbol-2::before  { content: '}'; }
        .symbol-3::before  { content: '<'; }
        .symbol-4::before  { content: '>'; }
        .symbol-5::before  { content: '/'; }
        .symbol-6::before  { content: ';'; }
        .symbol-7::before  { content: '('; }
        .symbol-8::before  { content: ')'; }
        .symbol-9::before  { content: '['; }
        .symbol-10::before { content: ']'; }
        .symbol-11::before { content: '='; }
        .symbol-12::before { content: '+'; }
        .symbol-13::before { content: '-'; }
        .symbol-14::before { content: '*'; }
        .symbol-15::before { content: '&'; }
        .symbol-16::before { content: '#'; }
        .symbol-17::before { content: '@'; }
        .symbol-18::before { content: '~'; }

        /* ── Music Player ── */
        .music-player-minimal {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(0, 0, 0, 0.9);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            transition: transform 0.3s ease;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(77, 171, 247, 0.2);
            height: 60px;
        }

        .music-player-minimal.hidden  { transform: translateY(-100%); }
        .music-player-minimal.visible { transform: translateY(0); }

        .minimal-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }

        .music-btn-minimal {
            background: none;
            border: none;
            color: #a0a0a0;
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.3s ease;
            padding: 5px;
            width: 36px; height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .music-btn-minimal:hover { color: #4dabf7; background: rgba(77,171,247,0.1); }

        .music-btn-minimal.play-btn { color: #4dabf7; font-size: 1.3rem; }
        .music-btn-minimal.play-btn:hover { color: #fff; background: rgba(77,171,247,0.2); }

        .music-info-minimal { flex: 2; text-align: center; overflow: hidden; }

        .music-title-minimal {
            color: #4dabf7;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .music-progress-minimal {
            flex: 3;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-bar-minimal {
            flex: 1;
            height: 2px;
            background: rgba(255,255,255,0.1);
            border-radius: 1px;
            overflow: hidden;
            cursor: pointer;
        }

        .progress-fill-minimal {
            height: 100%;
            background: #4dabf7;
            width: 0%;
            transition: width 0.1s linear;
        }

        .time-minimal { font-size: 0.8rem; color: #666; min-width: 35px; }

        .volume-control-minimal {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            justify-content: flex-end;
        }

        .volume-slider-minimal {
            width: 60px;
            -webkit-appearance: none;
            height: 2px;
            background: rgba(255,255,255,0.1);
            border-radius: 1px;
            outline: none;
        }

        .volume-slider-minimal::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #4dabf7;
            cursor: pointer;
        }

        /* ── Main Stage ── */
        .stage {
            min-height: calc(100vh - 60px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        .profile-pic {
            width: 90px; height: 90px;
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 32px;
            border: 2px solid rgba(77,171,247,0.3);
            transition: transform 0.3s ease;
        }

        .profile-pic:hover { transform: scale(1.05); }

        .profile-pic img {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .logo-name {
            font-size: 3.5rem;
            color: #fff;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .logo-name span {
            display: inline-block;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s forwards;
        }

        .logo-name span:nth-child(1) { animation-delay: 0.1s; }
        .logo-name span:nth-child(2) { animation-delay: 0.2s; }
        .logo-name span:nth-child(3) { animation-delay: 0.3s; }
        .logo-name span:nth-child(4) { animation-delay: 0.4s; }
        .logo-name span:nth-child(5) { animation-delay: 0.5s; }
        .logo-name span:nth-child(6) { animation-delay: 0.6s; }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Rework block ── */
        .rework-box {
            margin-top: 48px;
            border: 1px solid rgba(77,171,247,0.35);
            background: rgba(77,171,247,0.04);
            padding: 36px 48px;
            max-width: 560px;
            position: relative;
            animation: boxFadeIn 0.8s 0.9s both;
        }

        @keyframes boxFadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .rework-box::before,
        .rework-box::after {
            content: '';
            position: absolute;
            width: 10px; height: 10px;
            border-color: #4dabf7;
            border-style: solid;
        }

        .rework-box::before {
            top: -2px; left: -2px;
            border-width: 2px 0 0 2px;
        }

        .rework-box::after {
            bottom: -2px; right: -2px;
            border-width: 0 2px 2px 0;
        }

        .corner-tr, .corner-bl {
            position: absolute;
            width: 10px; height: 10px;
            border-color: #4dabf7;
            border-style: solid;
        }

        .corner-tr { top: -2px; right: -2px; border-width: 2px 2px 0 0; }
        .corner-bl { bottom: -2px; left: -2px; border-width: 0 0 2px 2px; }

        .rework-label {
            font-size: 0.75rem;
            color: #4dabf7;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 16px;
            opacity: 0.7;
        }

        .rework-label::before { content: '> '; }

        .rework-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 1.1rem;
            color: #fff;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .rework-title .blink {
            animation: blink 1.2s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }

        .rework-sub {
            font-size: 1.1rem;
            color: #666;
            margin-top: 4px;
        }

        .rework-sub span { color: #4dabf7; }

        /* ── Socials ── */
        .socials {
            display: flex;
            gap: 24px;
            margin-top: 40px;
            animation: boxFadeIn 0.8s 1.2s both;
        }

        .social-link {
            color: #555;
            font-size: 1.3rem;
            text-decoration: none;
            transition: color 0.3s, transform 0.3s;
        }

        .social-link:hover { color: #4dabf7; transform: translateY(-3px); }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .music-player-minimal { flex-wrap: wrap; height: auto; padding: 10px; }
            .minimal-controls     { order: 1; width: 100%; justify-content: center; margin-bottom: 8px; }
            .music-info-minimal   { order: 2; width: 100%; margin-bottom: 8px; }
            .music-progress-minimal { order: 3; width: 100%; }
            .volume-control-minimal { order: 4; width: 100%; justify-content: center; margin-top: 8px; }
            .rework-box { padding: 28px 24px; }
            .rework-title { font-size: 0.85rem; }
            .logo-name { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <!-- Music Player -->
    <div class="music-player-minimal visible" id="musicPlayerMinimal">
        <div class="minimal-controls">
            <button class="music-btn-minimal" id="prevBtnMinimal"><i class="fas fa-step-backward"></i></button>
            <button class="music-btn-minimal play-btn" id="playBtnMinimal"><i class="fas fa-play" id="playIconMinimal"></i></button>
            <button class="music-btn-minimal" id="nextBtnMinimal"><i class="fas fa-step-forward"></i></button>
        </div>
        <div class="music-info-minimal">
            <div class="music-title-minimal" id="musicTitleMinimal">Cargando música...</div>
        </div>
        <div class="music-progress-minimal">
            <span class="time-minimal" id="currentTimeMinimal">0:00</span>
            <div class="progress-bar-minimal" id="progressBarMinimal">
                <div class="progress-fill-minimal" id="progressFillMinimal"></div>
            </div>
            <span class="time-minimal" id="totalTimeMinimal">0:00</span>
        </div>
        <div class="volume-control-minimal">
            <button class="music-btn-minimal" id="volumeBtnMinimal"><i class="fas fa-volume-up" id="volumeIconMinimal"></i></button>
            <input type="range" class="volume-slider-minimal" id="volumeSliderMinimal" min="0" max="1" step="0.1" value="0.1">
        </div>
    </div>

    <!-- Particles -->
    <div id="particles-bg"></div>

    <!-- Main Content -->
    <div class="stage">
        <div class="profile-pic">
            <img src="https://i.imgur.com/SyCRJhg.jpeg" alt="Plxgio">
        </div>

        <div class="logo-name">
            <span>P</span><span>l</span><span>x</span><span>g</span><span>i</span><span>o</span>
        </div>

        <div class="rework-box">
            <div class="corner-tr"></div>
            <div class="corner-bl"></div>

            <div class="rework-label">status</div>
            <div class="rework-title">
                under rework<span class="blink">_</span>
            </div>
            <div class="rework-sub">
                la página se está reconstruyendo.<br>
                volvé en <span>un rato</span>.
            </div>
        </div>

        <div class="socials">
            <a href="https://github.com/Plxgio" target="_blank" class="social-link" title="GitHub">
                <i class="fab fa-github"></i>
            </a>
            <a href="https://x.com/Plxgio" target="_blank" class="social-link" title="X / Twitter">
                <i class="fab fa-twitter"></i>
            </a>
            <a href="https://plxgio.itch.io/" target="_blank" class="social-link" title="Itch.io">
                <i class="fas fa-gamepad"></i>
            </a>
        </div>
    </div>

    <audio id="backgroundMusic" preload="auto">
        Tu navegador no soporta audio.
    </audio>

    <script>
        // ── Particles ──
        (function createParticles() {
            const bg = document.getElementById('particles-bg');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                const sym = Math.floor(Math.random() * 18) + 1;
                p.className = `particle symbol-${sym}`;
                p.style.left = `${Math.random() * 100}%`;
                p.style.fontSize = `${Math.random() * 20 + 15}px`;
                const blue = Math.floor(Math.random() * 50) + 150;
                const op = (Math.random() * 0.2 + 0.1).toFixed(2);
                p.style.color = `rgba(77, ${blue}, 247, ${op})`;
                p.style.animationDuration = `${Math.random() * 15 + 20}s`;
                p.style.animationDelay    = `${Math.random() * 15}s`;
                bg.appendChild(p);
            }
        })();

        // ── Music Player ──
        const audio        = document.getElementById('backgroundMusic');
        const playBtn      = document.getElementById('playBtnMinimal');
        const playIcon     = document.getElementById('playIconMinimal');
        const prevBtn      = document.getElementById('prevBtnMinimal');
        const nextBtn      = document.getElementById('nextBtnMinimal');
        const volumeBtn    = document.getElementById('volumeBtnMinimal');
        const volumeIcon   = document.getElementById('volumeIconMinimal');
        const volumeSlider = document.getElementById('volumeSliderMinimal');
        const progressFill = document.getElementById('progressFillMinimal');
        const progressBar  = document.getElementById('progressBarMinimal');
        const currentTimeEl= document.getElementById('currentTimeMinimal');
        const totalTimeEl  = document.getElementById('totalTimeMinimal');
        const musicTitle   = document.getElementById('musicTitleMinimal');
        const musicPlayer  = document.getElementById('musicPlayerMinimal');

        const songs = [
            { title: "CP2077 - The Rebel Path",                     src: "music/Cyberpunk2077Therebeldpath.mp3" },
            { title: "Dawid Podsiadło, P.T. Adamczyk - Phantom Liberty", src: "music/Phantomliberty.mp3" },
            { title: "Still Corners - Sad Movies",                  src: "music/sadmovies.mp3" },
            { title: "The Black Eyed Peas - Pump It",               src: "music/pumpit.mp3" }
        ];

        let currentIdx = 0, isPlaying = false, isMuted = false, lastVol = 0.1;
        let lastScrollTop = 0, playerHidden = false, hideTimeout = null;

        function randomIdx() {
            let n;
            do { n = Math.floor(Math.random() * songs.length); } while (n === currentIdx && songs.length > 1);
            return n;
        }

        function fmt(s) {
            const m = Math.floor(s / 60), sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function loadSong(random = true) {
            if (random) currentIdx = randomIdx();
            const song = songs[currentIdx];
            musicTitle.textContent = song.title;
            audio.src = song.src;
            audio.load();
            audio.addEventListener('canplay', function once() {
                if (isPlaying) audio.play().catch(()=>{});
                audio.removeEventListener('canplay', once);
            });
            audio.addEventListener('error', function once() {
                setTimeout(() => loadSong(true), 2000);
                audio.removeEventListener('error', once);
            });
        }

        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                playIcon.classList.replace('fa-pause', 'fa-play');
                isPlaying = false;
            } else {
                audio.play().then(() => {
                    playIcon.classList.replace('fa-play', 'fa-pause');
                    isPlaying = true;
                }).catch(()=>{});
            }
        }

        function toggleMute() {
            if (isMuted) {
                audio.volume = lastVol;
                volumeSlider.value = lastVol;
                volumeIcon.classList.replace('fa-volume-mute', 'fa-volume-up');
            } else {
                lastVol = audio.volume;
                audio.volume = 0;
                volumeSlider.value = 0;
                volumeIcon.classList.replace('fa-volume-up', 'fa-volume-mute');
            }
            isMuted = !isMuted;
        }

        audio.addEventListener('timeupdate', () => {
            if (!audio.duration || isNaN(audio.duration)) return;
            progressFill.style.width = `${(audio.currentTime / audio.duration) * 100}%`;
            currentTimeEl.textContent = fmt(audio.currentTime);
            totalTimeEl.textContent   = fmt(audio.duration);
        });

        audio.addEventListener('ended', () => { loadSong(true); });

        progressBar.addEventListener('click', e => {
            const rect = progressBar.getBoundingClientRect();
            if (audio.duration && !isNaN(audio.duration))
                audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        });

        volumeSlider.addEventListener('input', e => {
            const v = parseFloat(e.target.value);
            audio.volume = v; lastVol = v;
            if (v === 0) { volumeIcon.classList.replace('fa-volume-up','fa-volume-mute'); isMuted = true; }
            else         { volumeIcon.classList.replace('fa-volume-mute','fa-volume-up'); isMuted = false; }
        });

        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', () => { loadSong(true); });
        nextBtn.addEventListener('click', () => { loadSong(true); });
        volumeBtn.addEventListener('click', toggleMute);

        // scroll hide/show
        window.addEventListener('scroll', () => {
            const st = window.pageYOffset;
            if (st <= 100) {
                musicPlayer.classList.replace('hidden','visible');
                playerHidden = false;
            } else if (st > lastScrollTop && !playerHidden) {
                musicPlayer.classList.replace('visible','hidden');
                playerHidden = true;
            } else if (st < lastScrollTop && playerHidden) {
                musicPlayer.classList.replace('hidden','visible');
                playerHidden = false;
                clearTimeout(hideTimeout);
                hideTimeout = setTimeout(() => {
                    if (window.pageYOffset > 100 && !musicPlayer.matches(':hover')) {
                        musicPlayer.classList.replace('visible','hidden');
                        playerHidden = true;
                    }
                }, 3000);
            }
            lastScrollTop = st;
        });

        musicPlayer.addEventListener('mouseenter', () => {
            if (playerHidden) {
                musicPlayer.classList.replace('hidden','visible');
                playerHidden = false;
            }
        });

        // init
        audio.volume = 0.1;
        loadSong(true);
        setTimeout(() => {
            audio.play().then(() => {
                isPlaying = true;
                playIcon.classList.replace('fa-play','fa-pause');
            }).catch(()=>{});
        }, 800);

        document.addEventListener('click', () => {
            if (!isPlaying) {
                audio.play().then(() => {
                    isPlaying = true;
                    playIcon.classList.replace('fa-play','fa-pause');
                }).catch(()=>{});
            }
        }, { once: true });
    </script>
</body>
</html>
